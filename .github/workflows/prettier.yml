name: Prettier Check

on:
  workflow_call:
    inputs:
      package_json_file:
        description: "Path to package.json file"
        required: false
        type: string
        default: "package.json"

jobs:
  prettier:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check for Prettier config
        run: |
          CONFIG_FILES=".prettierrc .prettierrc.json .prettierrc.js .prettierrc.yaml .prettierrc.yml .prettierrc.toml prettier.config.js prettier.config.mjs"
          HAS_CONFIG=false

          for file in $CONFIG_FILES; do
            if [ -f "$file" ]; then
              HAS_CONFIG=true
              break
            fi
          done

          if [ "$HAS_CONFIG" = false ] && ! grep -q '"prettier"' "${{ inputs.package_json_file }}" 2>/dev/null; then
            echo "::error file=.prettierrc::No Prettier configuration file found."
            echo "Please create a .prettierrc file or add prettier config to package.json"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: ${{ inputs.package_json_file }}

      - name: Install Prettier
        run: pnpm add -g prettier

      - name: Check formatting
        run: prettier --check .
