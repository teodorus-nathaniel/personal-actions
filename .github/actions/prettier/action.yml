name: Prettier Check
description: Validate Prettier configuration and formatting

inputs:
  changed-files:
    description: Optional pre-resolved changed files list
    required: false
    default: ""
  setup-runtime:
    description: Setup package manager runtime in this action
    required: false
    default: "true"
  package-manager:
    description: Package manager to use (bun or pnpm)
    required: false
    default: "bun"

runs:
  using: composite
  steps:
    - name: Checkout shared actions repository
      uses: actions/checkout@v4
      with:
        repository: holdex/github-actions
        ref: ${{ github.action_ref || github.workflow_sha }}
        path: .github-actions-source

    - name: Setup runtime
      uses: ./.github-actions-source/.github/actions/setup-runtime
      with:
        setup-runtime: ${{ inputs.setup-runtime }}
        package-manager: ${{ inputs.package-manager }}

    - name: Check for Prettier config
      id: prettier-config
      shell: bash
      run: |
        probe_file=".prettier-config-probe.tmp"
        touch "$probe_file"

        if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
          CHECK_CMD="pnpm dlx prettier --find-config-path \"$probe_file\""
        else
          CHECK_CMD="bunx prettier --find-config-path \"$probe_file\""
        fi

        if eval "$CHECK_CMD" >/dev/null 2>&1; then
          echo "has-config=true" >> "$GITHUB_OUTPUT"
        else
          echo "has-config=false" >> "$GITHUB_OUTPUT"
          echo "::error file=.prettierrc::No Prettier configuration file found."
          echo "A Prettier config file is required to ensure consistent formatting across all developers."
          echo "Without a shared config, each developer's local Prettier settings will differ, causing unnecessary formatting changes in commits."
          echo "Please create a .prettierrc file in your repository root."
          rm -f "$probe_file"
          exit 1
        fi

        rm -f "$probe_file"

    - name: Get changed files
      id: changed-files
      if: inputs.changed-files == ''
      uses: tj-actions/changed-files@22103cc46bda19c2b464ffe86db46df6922fd323

    - name: Resolve changed files
      id: resolved-files
      shell: bash
      run: |
        if [ -n "${{ inputs.changed-files }}" ]; then
          echo "any-changed=true" >> "$GITHUB_OUTPUT"
          echo "files=${{ inputs.changed-files }}" >> "$GITHUB_OUTPUT"
        else
          echo "any-changed=${{ steps.changed-files.outputs.any_changed }}" >> "$GITHUB_OUTPUT"
          echo "files=${{ steps.changed-files.outputs.all_changed_files }}" >> "$GITHUB_OUTPUT"
        fi

    - name: Install Prettier
      shell: bash
      run: |
        if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
          pnpm add -g prettier
        else
          bun i -g prettier
        fi

    - name: Install dependencies
      if: steps.prettier-config.outputs.has-config == 'true'
      shell: bash
      run: |
        if [ -f package.json ]; then
          if [ "${{ inputs.package-manager }}" = "pnpm" ]; then
            pnpm install
          else
            bun i
          fi
        else
          echo "No package.json found, skipping dependency installation."
        fi

    - name: Skip when no files changed
      if: steps.resolved-files.outputs.any-changed != 'true'
      shell: bash
      run: echo "No changed files to check with Prettier."

    - name: Check formatting
      if: steps.resolved-files.outputs.any-changed == 'true'
      shell: bash
      run:
        prettier --check --ignore-unknown ${{ steps.resolved-files.outputs.files
        }}
