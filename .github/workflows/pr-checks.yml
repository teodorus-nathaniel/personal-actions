name: PR Checks

on:
  workflow_call:
    inputs:
      run-prettier:
        description: "Run Prettier check"
        required: false
        type: boolean
        default: true
      run-markdown:
        description: "Run Markdown check"
        required: false
        type: boolean
        default: true
      run-commits:
        description: "Run Commit check"
        required: false
        type: boolean
        default: true
      package-manager:
        description: "Package manager to use (bun or pnpm)"
        required: false
        type: string
        default: bun

jobs:
  checks:
    if: github.event.pull_request == null || github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout shared actions repository
        uses: actions/checkout@v4
        with:
          repository: holdex/github-actions
          ref: ${{ github.workflow_sha }}
          path: .github-actions-source

      - name: Run selected PR checks
        uses: ./.github-actions-source/.github/actions/pr-checks
        with:
          run-prettier: ${{ inputs.run-prettier }}
          run-markdown: ${{ inputs.run-markdown }}
          run-commits: ${{ inputs.run-commits }}
          package-manager: ${{ inputs.package-manager }}
