name: Conventional Commit Check

on:
  workflow_call:
    inputs:
      package_json_file:
        description: "Path to package.json file"
        required: false
        type: string
        default: "package.json"

jobs:
  commit-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          package_json_file: ${{ inputs.package_json_file }}

      - name: Install commitlint
        run: |
          pnpm add -g @commitlint/cli
          pnpm add -D @commitlint/config-conventional

      - name: Create commitlint config if missing
        run: |
          if [ ! -f .commitlintrc.json ] && [ ! -f .commitlintrc.js ] && [ ! -f .commitlintrc.yml ] && [ ! -f .commitlintrc.yaml ] && ! grep -q '"commitlint"' "${{ inputs.package_json_file }}" 2>/dev/null; then
            echo '{"extends": ["@commitlint/config-conventional"]}' > .commitlintrc.json
          fi

      - name: Check PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "$PR_TITLE" | commitlint

      - name: Check commit messages
        if: github.event_name == 'pull_request'
        run: |
          set -e
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          while IFS= read -r commit_msg; do
            echo "$commit_msg" | commitlint
          done < <(git log --format=%s "$BASE_SHA..$HEAD_SHA")
